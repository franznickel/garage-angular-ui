<div class="flex flex-col flex-1 h-screen overflow-hidden bg-gray-200">
    <header class="flex items-center justify-between px-6 py-3">
      <div>
        <app-logo-component class="flex items-center gap-2.5 px-2"></app-logo-component>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="logout()" class="flex items-center px-2 py-1 rounded-lg bg-gray-50 text-sm shadow-md hover:shadow-sm transition cursor-pointer">
          Logout
        </button>
        <button class="flex items-center gap-1 px-2 py-1 rounded-lg bg-gray-50 text-sm shadow-md hover:shadow-sm transition cursor-pointer">
          <i class="ph ph-lifebuoy"></i>
          Help
        </button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <aside class="w-50 flex flex-col p-4 overflow-y-auto">
        <nav class="flex flex-col gap-0.5">
          <a routerLink="/dashboard/overview"
             routerLinkActive="bg-gray-50"
             [routerLinkActiveOptions]="{ exact: true }"
             class="flex items-center gap-2.5 p-3 text-sm rounded-lg hover:bg-gray-50 transition"
          >
            <i class="ph ph-squares-four"></i>
            Overview
          </a>
        </nav>
        <div class="mt-6 px-2 mb-1 text-[10.5px] font-semibold tracking-widest text-gray-400">STORAGE</div>
        <nav class="flex flex-col gap-0.5">
          <a routerLink="/dashboard/buckets"
             routerLinkActive="bg-gray-50"
             [routerLinkActiveOptions]="{ exact: true }"
             class="flex items-center gap-2.5 p-3 text-sm rounded-lg hover:bg-gray-50 transition"
          >
            <i class="ph ph-database"></i>
            Buckets
          </a>
        </nav>
        <div class="mt-6 px-2 mb-1 text-[10.5px] font-semibold tracking-widest text-gray-400">ACCESS</div>
        <nav class="flex flex-col gap-0.5">
          <a routerLink="/dashboard/keys"
             routerLinkActive="bg-gray-50"
             [routerLinkActiveOptions]="{ exact: true }"
             class="flex items-center gap-2.5 p-3 text-sm rounded-lg hover:bg-gray-50 transition"
          >
            <i class="ph ph-key"></i>
            Access Keys
          </a>
          <a routerLink="/dashboard/token"
             routerLinkActive="bg-gray-50"
             [routerLinkActiveOptions]="{ exact: true }"
             class="flex items-center gap-2.5 p-3 text-sm rounded-lg hover:bg-gray-50 transition"
          >
            <i class="ph ph-clipboard-text"></i>
            Admin Tokens
          </a>
        </nav>
        <div class="mt-6 px-2 mb-1 text-[10.5px] font-semibold tracking-widest text-gray-400">CLUSTER</div>
        <nav class="flex flex-col gap-0.5">
          <a routerLink="/dashboard/nodes"
             routerLinkActive="bg-gray-50"
             [routerLinkActiveOptions]="{ exact: true }"
             class="flex items-center gap-2.5 p-3 text-sm rounded-lg hover:bg-gray-50 transition"
          >
            <i class="ph ph-graph"></i>
            Nodes
          </a>
          <a routerLink="/dashboard/layout"
             routerLinkActive="bg-gray-50"
             [routerLinkActiveOptions]="{ exact: true }"
             class="flex items-center gap-2.5 p-3 text-sm rounded-lg hover:bg-gray-50 transition"
          >
            <i class="ph ph-strategy"></i>
            Layout
          </a>
        </nav>
      </aside>

      <main class="flex-1 overflow-y-auto p-7 bg-gray-50 rounded-tl-lg shadow-sm">
        <router-outlet></router-outlet>
      </main>
    </div>
</div>
