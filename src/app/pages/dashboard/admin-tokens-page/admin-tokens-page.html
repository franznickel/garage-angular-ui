<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold">Token</h1>
    <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
  </div>
  @if (adminTokens$ | async; as tokens) {
    <div class="flex flex-col gap-3">
      @for (token of tokens; track token.id) {
        <app-token-card-component [token]="token"></app-token-card-component>
      }
    </div>
  }
</div>
