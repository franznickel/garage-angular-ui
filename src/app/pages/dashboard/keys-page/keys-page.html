<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold">Keys</h1>
    <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
  </div>
  @if (keys$ | async; as keys) {
    <div class="flex flex-col gap-3">
      @for (key of keys; track key.id) {
        <app-key-card-component [key]="key"></app-key-card-component>
      }
    </div>
  }
</div>
