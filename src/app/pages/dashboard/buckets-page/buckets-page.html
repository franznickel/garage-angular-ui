<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold">Buckets</h1>
    <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
  </div>
  @if (buckets$ | async; as buckets) {
    <div class="flex flex-col gap-3">
      @for (bucket of buckets; track bucket.id) {
        <app-bucket-card-component [bucket]="bucket"></app-bucket-card-component>
      }
    </div>
  }
</div>
