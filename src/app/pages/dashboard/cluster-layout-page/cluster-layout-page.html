<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold">Cluster Layout</h1>
    <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
  </div>
  @if (layout$ | async; as layout) {
    @if (layout.partitionSize == 0 || layout.roles.length == 0) {
      <div class="flex flex-col items-center justify-center gap-4 py-16 rounded-2xl border-2 border-dashed border-gray-200 bg-gray-50">
        <i class="ph ph-warning-circle text-4xl text-orange-400"></i>
        <div class="text-center">
          <p class="text-sm font-semibold text-gray-700 mb-1">Kein Cluster Layout vorhanden</p>
          <p class="text-xs text-gray-400">Ein Layout muss erstellt werden bevor Buckets genutzt werden können.</p>
        </div>
        <button
          (click)="openSetupDialog()"
          class="mt-2 px-4 py-2 text-sm font-semibold text-white bg-orange-400 hover:bg-orange-500 rounded-xl transition cursor-pointer">
          Layout einrichten
        </button>
      </div>
    } @else {
      <div class="flex flex-col gap-6">
        <div>
          <h2 class="text-xs text-gray-400 uppercase tracking-wide mb-3">Übersicht</h2>
          <div class="grid grid-cols-3 gap-4">
            <app-info-card-component [key]="'Version'" [value]="layout.version?.toString()"></app-info-card-component>
            <app-info-card-component [key]="'Partition Size'" [value]="(layout.partitionSize | number) + ' Bytes'"></app-info-card-component>
          </div>
        </div>
        <div>
          <h2 class="text-xs text-gray-400 uppercase tracking-wide mb-3">Roles</h2>
          <div class="flex flex-col gap-2">
            @for (role of layout.roles; track role.id) {
              <app-role-card-component [role]="role"></app-role-card-component>
            }
          </div>
        </div>
      </div>
    }
  }
</div>
