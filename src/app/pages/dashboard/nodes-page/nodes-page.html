<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold">Nodes</h1>
    <div class="flex items-center gap-3">
      <button
        (click)="toggleConnectPanel()"
        class="px-4 py-2 text-sm font-semibold text-white bg-orange-400 hover:bg-orange-500 rounded-xl transition cursor-pointer">
        Connect Node
      </button>
      <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
    </div>
  </div>
  @if (connectOpen) {
    <div class="mb-6 p-6 rounded-2xl border border-gray-200 bg-white flex flex-col gap-4">
      <h2 class="text-sm font-semibold text-gray-700">Connect Node</h2>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Node Address</label>
        <input
          type="text"
          [(ngModel)]="connectAddress"
          placeholder="<node_id>@<address>"
          class="px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:bg-white transition font-mono"
        />
      </div>
      @if (connectError) {
        <div class="bg-red-50 text-red-600 text-xs rounded-lg px-3.5 py-2.5 border border-red-100">
          {{ connectError }}
        </div>
      }
      @if (connectSuccess) {
        <div class="bg-green-50 text-green-600 text-xs rounded-lg px-3.5 py-2.5 border border-green-100">
          Node connected successfully.
        </div>
      }
      <div class="flex gap-3">
        <button
          (click)="submitConnect()"
          [disabled]="isConnecting"
          class="px-4 py-2 text-sm font-semibold text-white bg-orange-400 hover:bg-orange-500 rounded-xl transition cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isConnecting ? 'Is Connecting…' : 'Connecting' }}
        </button>
        <button
          (click)="toggleConnectPanel()"
          class="px-4 py-2 text-sm font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition cursor-pointer">
          Abort
        </button>
      </div>
    </div>
  }
  @if (status$ | async; as status) {
    <div class="flex flex-col gap-3">
      @for (node of status.nodes; track node.id) {
        <app-node-card-component [node]="node"></app-node-card-component>
      }
    </div>
  }
</div>
