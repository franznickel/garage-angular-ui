<a [routerLink]="['/dashboard/buckets', bucket.id]" class="flex items-center justify-between p-4 rounded-lg bg-gray-100 shadow-md hover:shadow-sm transition cursor-pointer">
  <div class="flex flex-col gap-1">
    <div class="text-sm font-semibold">
      {{ bucket.globalAliases }}
    </div>
    <div class="text-xs text-gray-500">
      Created {{ bucket.created | date:'medium' }}
    </div>
    @for (localAlias of bucket.localAliases; track localAlias.accessKeyId) {
      <div class="text-xs text-gray-500">
        {{ localAlias.alias }}
      </div>
    }
  </div>
  <i class="ph ph-arrow-right"></i>
</a>
